<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reflection — DeepThought</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1814;--paper:#f5f0e8;--paper-warm:#ede7d9;--accent:#c4622d;--accent-soft:#e8c4a8;--muted:#8a8070;--line:#d4cdc0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 20% 50%,rgba(196,98,45,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(100,80,60,.05) 0%,transparent 50%);}
.shell{width:100%;max-width:640px;}
.brand{text-align:center;margin-bottom:40px;opacity:0;animation:fadeUp .6s ease forwards;}
.brand-name{font-family:'Playfair Display',serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.brand-dot{display:inline-block;width:4px;height:4px;background:var(--accent);border-radius:50%;margin:0 8px;vertical-align:middle;}
.card{background:white;border-radius:2px;padding:52px 52px 44px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent-soft) 100%);}
.axis-indicator{display:flex;gap:6px;margin-bottom:36px;opacity:0;animation:fadeUp .5s ease .1s forwards;}
.axis-pip{height:2px;flex:1;background:var(--line);border-radius:2px;transition:background .4s ease;}
.axis-pip.active{background:var(--accent);}
.axis-pip.done{background:var(--accent-soft);}
.node-type-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;opacity:0;animation:fadeUp .5s ease .15s forwards;}
.question-text{font-family:'Playfair Display',serif;font-size:22px;line-height:1.55;color:var(--ink);margin-bottom:36px;opacity:0;animation:fadeUp .6s ease .2s forwards;}
.options{display:flex;flex-direction:column;gap:10px;opacity:0;animation:fadeUp .6s ease .3s forwards;}
.option-btn{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;background:var(--paper);border:1px solid var(--line);border-radius:2px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:14.5px;font-weight:400;color:var(--ink);line-height:1.5;transition:all .15s ease;}
.option-btn:hover{background:var(--paper-warm);border-color:var(--accent-soft);transform:translateX(3px);}
.option-btn.selected{background:var(--accent);border-color:var(--accent);color:white;}
.option-letter{font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--muted);min-width:18px;padding-top:1px;transition:color .15s;}
.option-btn.selected .option-letter{color:rgba(255,255,255,.7);}
.option-btn:hover .option-letter{color:var(--accent);}
.reflection-block{opacity:0;animation:fadeUp .7s ease .2s forwards;}
.reflection-icon{font-size:28px;margin-bottom:20px;display:block;}
.reflection-text{font-size:16px;line-height:1.75;color:var(--ink);margin-bottom:32px;border-left:2px solid var(--accent-soft);padding-left:20px;}
.continue-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--ink);color:var(--paper);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:.06em;cursor:pointer;transition:all .15s;}
.continue-btn:hover{background:var(--accent);transform:translateX(3px);}
.start-block{text-align:center;opacity:0;animation:fadeUp .8s ease .1s forwards;}
.greeting{font-family:'Playfair Display',serif;font-size:26px;line-height:1.5;margin-bottom:28px;}
.greeting em{font-style:italic;color:var(--accent);}
.sub{font-size:14px;color:var(--muted);margin-bottom:36px;line-height:1.6;}
.start-btn{padding:14px 40px;background:var(--accent);color:white;border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:14px;letter-spacing:.06em;cursor:pointer;transition:all .2s;}
.start-btn:hover{background:#a8521f;transform:translateY(-1px);box-shadow:0 4px 16px rgba(196,98,45,.3);}
.summary-block{opacity:0;animation:fadeUp .7s ease .1s forwards;}
.summary-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:28px;color:var(--ink);}
.axis-summary{padding:20px 0;border-bottom:1px solid var(--line);}
.axis-summary:last-child{border-bottom:none;}
.axis-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.axis-result{font-size:15px;color:var(--ink);line-height:1.6;}
.axis-chip{display:inline-block;padding:2px 10px;border-radius:2px;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-right:6px;margin-bottom:6px;}
.chip-internal{background:#e8f0ec;color:#2d5a3f;}
.chip-external{background:#f0ebe3;color:#6b4e2a;}
.chip-contribution{background:#e3eaf5;color:#2d4a7a;}
.chip-entitlement{background:#f5e3ea;color:#7a2d4a;}
.chip-altrocentric{background:#ece3f5;color:#4a2d7a;}
.chip-other{background:#f0ece3;color:#5a4d2a;}
.chip-self{background:#f5ece3;color:#7a5a2d;}
.end-block{text-align:center;padding:16px 0;opacity:0;animation:fadeUp .6s ease .2s forwards;}
.end-text{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--muted);}
.restart-link{display:inline-block;margin-top:20px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.restart-link:hover{color:var(--accent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.card{padding:36px 24px 32px;}.question-text{font-size:19px;}}
</style>
</head>
<body>
<div class="shell">
  <div class="brand">
    <span class="brand-name">DeepThought</span>
    <span class="brand-dot"></span>
    <span class="brand-name">Daily Reflection</span>

  <div class="card">
    <div id="app"></div>
  </div>
</div>
<script>
const TREE=[{id:"START",parentId:null,type:"start",text:"Good evening. Before the day slips away — let's look at it together. Five minutes. No scores. Just a quiet mirror.",options:[],target:"A1_OPEN",signal:""},{id:"A1_OPEN",parentId:"START",type:"question",text:"If today were a weather report, what would it be?",options:["Sunny — things went my way","Cloudy — mixed, uncertain","Stormy — hard and draining","Foggy — I'm not sure what happened"],target:"",signal:""},{id:"A1_D_OPEN",parentId:"A1_OPEN",type:"decision",text:"",options:"answer=Sunny — things went my way|Cloudy — mixed, uncertain:A1_Q1_HIGH;answer=Stormy — hard and draining|Foggy — I'm not sure what happened:A1_Q1_LOW",target:"",signal:""},{id:"A1_Q1_HIGH",parentId:"A1_D_OPEN",type:"question",text:"You described today as '{A1_OPEN.answer}'. When something went well, what do you think made it happen?",options:["I had prepared and it showed","I adjusted when things shifted","Someone helped me at the right moment","I got lucky — hard to say why"],target:"",signal:"axis1:internal"},{id:"A1_Q1_LOW",parentId:"A1_D_OPEN",type:"question",text:"You described today as '{A1_OPEN.answer}'. When things got difficult, where did your mind go first?",options:["I looked for what I could still control","I felt stuck waiting for something to change","I blamed myself — probably too harshly","I wondered why this keeps happening to me"],target:"",signal:"axis1:external"},{id:"A1_D1",parentId:"A1_Q1_HIGH",type:"decision",text:"",options:"answer=I had prepared and it showed|I adjusted when things shifted:A1_Q2_AGENCY;answer=Someone helped me at the right moment|I got lucky — hard to say why:A1_Q2_LUCK",target:"",signal:""},{id:"A1_D2",parentId:"A1_Q1_LOW",type:"decision",text:"",options:"answer=I looked for what I could still control:A1_Q2_AGENCY;answer=I felt stuck waiting for something to change|I blamed myself — probably too harshly|I wondered why this keeps happening to me:A1_Q2_STUCK",target:"",signal:""},{id:"A1_Q2_AGENCY",parentId:"A1_D1",type:"question",text:"Think of one moment today where things didn't go as planned. What did you do?",options:["I found a different path to the same goal","I accepted it and moved on","I asked for help and kept moving","I tried to push through, even if it cost me"],target:"",signal:"axis1:internal"},{id:"A1_Q2_STUCK",parentId:"A1_D2",type:"question",text:"When things got hard today, was there a moment — even a small one — where you had a choice?",options:["Yes, and I made a call — not sure if it was right","Yes, but I didn't act on it","I'm not sure I saw any choice at the time","Looking back now, I think there was one"],target:"",signal:"axis1:external"},{id:"A1_Q2_LUCK",parentId:"A1_D1",type:"question",text:"Even on days when things go your way, there's usually something you did that helped. What was yours today?",options:["I showed up with energy and focus","I kept communication clear","I stayed patient when I could have snapped","Honestly, I'm not sure — it just happened"],target:"",signal:"axis1:internal"},{id:"A1_D3",parentId:"A1_Q2_AGENCY",type:"decision",text:"",options:"answer=I found a different path to the same goal|I accepted it and moved on|I asked for help and kept moving|I tried to push through, even if it cost me:A1_R_INT",target:"",signal:""},{id:"A1_D4",parentId:"A1_Q2_STUCK",type:"decision",text:"",options:"answer=Yes, and I made a call — not sure if it was right|Yes, but I didn't act on it|Looking back now, I think there was one:A1_R_EXT_GROW;answer=I'm not sure I saw any choice at the time:A1_R_EXT_STUCK",target:"",signal:""},{id:"A1_D5",parentId:"A1_Q2_LUCK",type:"decision",text:"",options:"answer=I showed up with energy and focus|I kept communication clear|I stayed patient when I could have snapped:A1_R_INT;answer=Honestly, I'm not sure — it just happened:A1_R_EXT_GROW",target:"",signal:""},{id:"A1_R_INT",parentId:"A1_D3",type:"reflection",text:"You stayed in the driver's seat today — not perfectly, but consciously. That's agency: not that nothing went wrong, but that you kept looking for your next move. Not a personality trait. A practice.",options:[],target:"BRIDGE_1_2",signal:"axis1:dominant_internal"},{id:"A1_R_EXT_GROW",parentId:"A1_D4",type:"reflection",text:"A tough day pulls your gaze outward — to what went wrong, who let you down, what you couldn't control. That's human. But you just noticed there was a choice somewhere in there. That noticing? That's the start of something.",options:[],target:"BRIDGE_1_2",signal:"axis1:dominant_external"},{id:"A1_R_EXT_STUCK",parentId:"A1_D4",type:"reflection",text:"Some days feel entirely out of your hands. And sometimes they genuinely are. But here's a small question to sleep on: was there one moment — even a two-second one — where your response was yours to choose? You don't have to answer now.",options:[],target:"BRIDGE_1_2",signal:"axis1:dominant_external"},{id:"BRIDGE_1_2",parentId:"A1_R_INT",type:"bridge",text:"Now let's shift from how you handled the day — to what you gave to it.",options:[],target:"A2_OPEN",signal:""},{id:"A2_OPEN",parentId:"BRIDGE_1_2",type:"question",text:"Think of one interaction you had today. In that moment, which of these felt more true?",options:["I was thinking about what I could offer","I was thinking about what I would get","I was thinking about getting through it","I wasn't really thinking — I was on autopilot"],target:"",signal:""},{id:"A2_D_OPEN",parentId:"A2_OPEN",type:"decision",text:"",options:"answer=I was thinking about what I could offer:A2_Q1_CONTRIB;answer=I was thinking about what I would get|I wasn't really thinking — I was on autopilot:A2_Q1_ENT;answer=I was thinking about getting through it:A2_Q1_NEUTRAL",target:"",signal:""},{id:"A2_Q1_CONTRIB",parentId:"A2_D_OPEN",type:"question",text:"You said you were thinking about what you could offer. Did you actually do something beyond what was expected of you today?",options:["Yes — I helped with something that wasn't mine to do","Yes — I put in extra effort on something that mattered","Sort of — I tried, but it might not have landed","Not today, but I wanted to"],target:"",signal:"axis2:contribution"},{id:"A2_Q1_ENT",parentId:"A2_D_OPEN",type:"question",text:"Think honestly: was there a moment today where you felt you deserved more than you received — more credit, more help, more recognition?",options:["Yes, and it bothered me for a while","Yes, but I let it go quickly","Briefly, but it passed","No — I didn't really think about it"],target:"",signal:"axis2:entitlement"},{id:"A2_Q1_NEUTRAL",parentId:"A2_D_OPEN",type:"question",text:"When you were in 'just get through it' mode — who else was in the room with you (literally or figuratively)?",options:["A colleague who was also struggling","My manager or someone I report to","A customer or external person","I was mostly alone with the task"],target:"",signal:"axis2:contribution"},{id:"A2_D1",parentId:"A2_Q1_CONTRIB",type:"decision",text:"",options:"answer=Yes — I helped with something that wasn't mine to do|Yes — I put in extra effort on something that mattered:A2_Q2_CONTRIB_DEEP;answer=Sort of — I tried, but it might not have landed|Not today, but I wanted to:A2_Q2_CONTRIB_SOFT",target:"",signal:""},{id:"A2_D2",parentId:"A2_Q1_ENT",type:"decision",text:"",options:"answer=Yes, and it bothered me for a while|Yes, but I let it go quickly:A2_Q2_ENT;answer=Briefly, but it passed|No — I didn't really think about it:A2_Q2_CONTRIB_SOFT",target:"",signal:""},{id:"A2_D3",parentId:"A2_Q1_NEUTRAL",type:"decision",text:"",options:"answer=A colleague who was also struggling|A customer or external person:A2_Q2_CONTRIB_DEEP;answer=My manager or someone I report to|I was mostly alone with the task:A2_Q2_CONTRIB_SOFT",target:"",signal:""},{id:"A2_Q2_CONTRIB_DEEP",parentId:"A2_D1",type:"question",text:"When you gave something extra today, what was driving it?",options:["I genuinely wanted to help","I felt it was the right thing to do","I hoped it would be noticed","A bit of all of these — I'm not sure"],target:"",signal:"axis2:contribution"},{id:"A2_Q2_CONTRIB_SOFT",parentId:"A2_D2",type:"question",text:"Is there something you could have done today — for a colleague, a customer, the team — that you didn't do? What got in the way?",options:["I was too stretched — genuinely no bandwidth","I noticed but chose not to act","I didn't notice until just now","I did act — maybe I'm being too hard on myself"],target:"",signal:"axis2:contribution"},{id:"A2_Q2_ENT",parentId:"A2_D2",type:"question",text:"The feeling of not getting enough recognition is real. But let's flip it: did someone else give more than they received today?",options:["Yes — a colleague clearly carried more than their share","Probably, but I didn't really notice at the time","Maybe — I wasn't paying attention that way","No, I think it was roughly fair"],target:"",signal:"axis2:entitlement"},{id:"A2_D4",parentId:"A2_Q2_CONTRIB_DEEP",type:"decision",text:"",options:"answer=I genuinely wanted to help|I felt it was the right thing to do:A2_R_CONTRIB;answer=I hoped it would be noticed|A bit of all of these — I'm not sure:A2_R_MIXED",target:"",signal:""},{id:"A2_D5",parentId:"A2_Q2_CONTRIB_SOFT",type:"decision",text:"",options:"answer=I was too stretched — genuinely no bandwidth|I did act — maybe I'm being too hard on myself:A2_R_CONTRIB;answer=I noticed but chose not to act|I didn't notice until just now:A2_R_MIXED",target:"",signal:""},{id:"A2_D6",parentId:"A2_Q2_ENT",type:"decision",text:"",options:"answer=Yes — a colleague clearly carried more than their share|Probably, but I didn't really notice at the time:A2_R_ENT_GROW;answer=Maybe — I wasn't paying attention that way|No, I think it was roughly fair:A2_R_ENT",target:"",signal:""},{id:"A2_R_CONTRIB",parentId:"A2_D4",type:"reflection",text:"You gave something today without keeping score. Organizational citizenship — the discretionary effort no job description captures — is what makes a team more than a group of individuals. You practiced it today.",options:[],target:"BRIDGE_2_3",signal:"axis2:dominant_contribution"},{id:"A2_R_MIXED",parentId:"A2_D5",type:"reflection",text:"Most of us give for mixed reasons — genuine care, self-interest, habit. That's honest. The question isn't purity of motive. It's whether, on balance, you moved toward giving or taking. Today sounds like a lean toward giving.",options:[],target:"BRIDGE_2_3",signal:"axis2:dominant_contribution"},{id:"A2_R_ENT_GROW",parentId:"A2_D6",type:"reflection",text:"You noticed someone else's contribution today. That's a shift. Entitlement is invisible to the person feeling it — it's a lens, not a feeling. The moment you see what others are putting in, the lens is already changing.",options:[],target:"BRIDGE_2_3",signal:"axis2:dominant_entitlement"},{id:"A2_R_ENT",parentId:"A2_D6",type:"reflection",text:"It's worth noticing: you spent some energy today tracking what you deserved. Everyone does this sometimes. The question for tomorrow: can you lead with one action before you start counting?",options:[],target:"BRIDGE_2_3",signal:"axis2:dominant_entitlement"},{id:"BRIDGE_2_3",parentId:"A2_R_CONTRIB",type:"bridge",text:"One last shift. From what you gave — to who you saw.",options:[],target:"A3_OPEN",signal:""},{id:"A3_OPEN",parentId:"BRIDGE_2_3",type:"question",text:"When you think about today's most significant moment, whose experience comes to mind — besides your own?",options:["No one in particular — it was really about me","A specific colleague who was also in it","The team or group as a whole","Someone outside — a customer, partner, or end user"],target:"",signal:""},{id:"A3_D_OPEN",parentId:"A3_OPEN",type:"decision",text:"",options:"answer=No one in particular — it was really about me:A3_Q1_SELF;answer=A specific colleague who was also in it:A3_Q1_COLLEAGUE;answer=The team or group as a whole|Someone outside — a customer, partner, or end user:A3_Q1_WIDE",target:"",signal:""},{id:"A3_Q1_SELF",parentId:"A3_D_OPEN",type:"question",text:"Being absorbed in your own experience isn't wrong — sometimes the work demands it. But just for a moment: was there anyone around you today who might have had a harder time than they showed?",options:["Yes, now that I think about it — someone was quieter than usual","Maybe — I didn't look that closely","I don't think so — everyone seemed fine","I genuinely had no bandwidth to notice"],target:"",signal:"axis3:self"},{id:"A3_Q1_COLLEAGUE",parentId:"A3_D_OPEN",type:"question",text:"You thought of a specific person. Did you do anything with that awareness today — or did you notice and move on?",options:["I checked in with them or helped in some way","I noticed but didn't act — didn't want to overstep","I noticed but was too busy","I noticed after the fact, too late to do anything"],target:"",signal:"axis3:other"},{id:"A3_Q1_WIDE",parentId:"A3_D_OPEN",type:"question",text:"When you think about the team or customer you mentioned — was your work today connected to something that matters to them?",options:["Yes — I can draw a direct line from my work to their outcome","I think so, but the connection is fuzzy","Probably, but I wasn't thinking about it that way today","Not directly — but it's there in the bigger picture"],target:"",signal:"axis3:altrocentric"},{id:"A3_D1",parentId:"A3_Q1_SELF",type:"decision",text:"",options:"answer=Yes, now that I think about it — someone was quieter than usual|Maybe — I didn't look that closely|I genuinely had no bandwidth to notice:A3_Q2_SELF_GROW;answer=I don't think so — everyone seemed fine:A3_Q2_SELF",target:"",signal:""},{id:"A3_D2",parentId:"A3_Q1_COLLEAGUE",type:"decision",text:"",options:"answer=I checked in with them or helped in some way:A3_Q2_ALTRO;answer=I noticed but didn't act — didn't want to overstep|I noticed but was too busy|I noticed after the fact, too late to do anything:A3_Q2_COLLEAGUE_PASSIVE",target:"",signal:""},{id:"A3_D3",parentId:"A3_Q1_WIDE",type:"decision",text:"",options:"answer=Yes — I can draw a direct line from my work to their outcome:A3_Q2_ALTRO;answer=I think so, but the connection is fuzzy|Probably, but I wasn't thinking about it that way today|Not directly — but it's there in the bigger picture:A3_Q2_WIDE_SOFT",target:"",signal:""},{id:"A3_Q2_SELF",parentId:"A3_D1",type:"question",text:"What does success look like for you at work — in one sentence?",options:["I do my job well and advance my career","My team hits its goals and I'm part of that","The people I work for get what they need","Something larger — leaving things better than I found them"],target:"",signal:"axis3:self"},{id:"A3_Q2_SELF_GROW",parentId:"A3_D1",type:"question",text:"If you had noticed that person earlier, what might you have done?",options:["Just asked how they were doing","Helped with whatever was weighing on them","Probably nothing — I'm not sure it was my place","Shared what I was dealing with too — sometimes that helps"],target:"",signal:"axis3:other"},{id:"A3_Q2_ALTRO",parentId:"A3_D2",type:"question",text:"When you act beyond your own immediate interests — what makes it worth it for you?",options:["The relationship — it builds something real","The meaning — it connects my work to something bigger","The team — we all move forward together","It's just what you do — I don't analyse it"],target:"",signal:"axis3:altrocentric"},{id:"A3_Q2_COLLEAGUE_PASSIVE",parentId:"A3_D2",type:"question",text:"You noticed something but didn't act. What usually stops you from reaching out to a colleague who's struggling?",options:["Fear of making it worse or overstepping","Time — I barely had enough for my own work","I assumed someone else would step in","Habit — I tend to keep to myself"],target:"",signal:"axis3:other"},{id:"A3_Q2_WIDE_SOFT",parentId:"A3_D3",type:"question",text:"If the person or group you mentioned could see your work today, what would you want them to feel about it?",options:["That someone was thinking about them, not just the task","That the work was done with care","That it moved things forward for them","I hadn't thought about it that way before"],target:"",signal:"axis3:altrocentric"},{id:"A3_D4",parentId:"A3_Q2_SELF",type:"decision",text:"",options:"answer=I do my job well and advance my career:A3_R_SELF;answer=My team hits its goals and I'm part of that|The people I work for get what they need|Something larger — leaving things better than I found them:A3_R_GROW",target:"",signal:""},{id:"A3_D5",parentId:"A3_Q2_SELF_GROW",type:"decision",text:"",options:"answer=Just asked how they were doing|Shared what I was dealing with too — sometimes that helps:A3_R_GROW;answer=Helped with whatever was weighing on them:A3_R_ALTRO;answer=Probably nothing — I'm not sure it was my place:A3_R_SELF",target:"",signal:""},{id:"A3_D6",parentId:"A3_Q2_ALTRO",type:"decision",text:"",options:"answer=The relationship — it builds something real|The meaning — it connects my work to something bigger|The team — we all move forward together|It's just what you do — I don't analyse it:A3_R_ALTRO",target:"",signal:""},{id:"A3_D7",parentId:"A3_Q2_COLLEAGUE_PASSIVE",type:"decision",text:"",options:"answer=Fear of making it worse or overstepping|I assumed someone else would step in|Habit — I tend to keep to myself:A3_R_GROW;answer=Time — I barely had enough for my own work:A3_R_SELF",target:"",signal:""},{id:"A3_D8",parentId:"A3_Q2_WIDE_SOFT",type:"decision",text:"",options:"answer=That someone was thinking about them, not just the task|That the work was done with care|That it moved things forward for them:A3_R_ALTRO;answer=I hadn't thought about it that way before:A3_R_GROW",target:"",signal:""},{id:"A3_R_SELF",parentId:"A3_D4",type:"reflection",text:"There's nothing wrong with showing up for yourself. But Maslow's later work noted that the deepest satisfaction came from connecting work to something beyond oneself — not self-sacrifice, but self-transcendence. Worth a thought for tomorrow.",options:[],target:"SUMMARY",signal:"axis3:dominant_self"},{id:"A3_R_GROW",parentId:"A3_D5",type:"reflection",text:"You're starting to see past your own frame. That's perspective-taking — not sympathy, but the harder thing: genuinely imagining another person's experience from the inside. It changes what you notice. It changes what you do next.",options:[],target:"SUMMARY",signal:"axis3:dominant_other"},{id:"A3_R_ALTRO",parentId:"A3_D6",type:"reflection",text:"You operated with a wide radius today — your work landed somewhere beyond just yourself. That's what Maslow called self-transcendence: not self-sacrifice, but the recognition that meaning comes from contributing to something that outlasts the moment.",options:[],target:"SUMMARY",signal:"axis3:dominant_altrocentric"},{id:"SUMMARY",parentId:"A3_R_SELF",type:"summary",text:"",options:[],target:"END",signal:""},{id:"END",parentId:"SUMMARY",type:"end",text:"See you tomorrow.",options:[],target:"",signal:""}];

const tree={};
TREE.forEach(n=>tree[n.id]=n);
const state={currentId:"START",answers:{},signals:{axis1:{internal:0,external:0,dominant:null},axis2:{contribution:0,entitlement:0,dominant:null},axis3:{altrocentric:0,other:0,self:0,dominant:null}},history:[]};

function getAxis(id){if(id.startsWith("A1"))return 1;if(id.startsWith("A2"))return 2;if(id.startsWith("A3"))return 3;if(id==="SUMMARY"||id==="END")return 4;return 0;}
function interpolate(t){return t.replace(/\{([^}]+)\}/g,(_,k)=>{const[nId,f]=k.split(".");if(f==="answer"&&state.answers[nId])return state.answers[nId];return k;});}
function applySignal(s){if(!s)return;const[ax,v]=s.split(":");if(ax==="axis1"){if(v==="internal")state.signals.axis1.internal++;else if(v==="external")state.signals.axis1.external++;else if(v==="dominant_internal")state.signals.axis1.dominant="internal";else if(v==="dominant_external")state.signals.axis1.dominant="external";}else if(ax==="axis2"){if(v==="contribution")state.signals.axis2.contribution++;else if(v==="entitlement")state.signals.axis2.entitlement++;else if(v==="dominant_contribution")state.signals.axis2.dominant="contribution";else if(v==="dominant_entitlement")state.signals.axis2.dominant="entitlement";}else if(ax==="axis3"){if(v==="altrocentric")state.signals.axis3.altrocentric++;else if(v==="other")state.signals.axis3.other++;else if(v==="self")state.signals.axis3.self++;else if(v==="dominant_altrocentric")state.signals.axis3.dominant="altrocentric";else if(v==="dominant_other")state.signals.axis3.dominant="other";else if(v==="dominant_self")state.signals.axis3.dominant="self";}}
function resolveDecision(node){const rules=node.options.split(";");for(const rule of rules){const[condition,target]=rule.split(":");const[key,valStr]=condition.split("=");if(key.trim()==="answer"){const vals=valStr.split("|");const pa=state.answers[node.parentId];if(pa&&vals.includes(pa))return target.trim();}}return rules[0].split(":")[1]?.trim()||null;}
function getNextNode(cur,answer){if(answer)state.answers[cur.id]=answer;applySignal(cur.signal);if(cur.target)return tree[cur.target];const children=TREE.filter(n=>n.parentId===cur.id);if(!children.length)return null;const dec=children.find(c=>c.type==="decision");if(dec){const tid=resolveDecision(dec);return tid?tree[tid]:null;}return children[0];}
function advance(answer){const cur=tree[state.currentId];const next=getNextNode(cur,answer);if(!next)return;state.history.push(state.currentId);state.currentId=next.id;applySignal(next.signal);if(["decision","bridge"].includes(next.type)){advance(null);return;}render();}

const SUMMARIES={axis1:{internal:"You kept looking for your next move, even when things were outside your control. Agency isn't the absence of difficulty — it's the habit of asking 'what can I do from here?'",external:"A hard day pulled attention to what you couldn't control. The question to carry: where, in all of that, was the moment that was yours?"},axis2:{contribution:"You gave something today — not perfectly, not without mixed motives — but you moved toward others more than toward the ledger.",entitlement:"You noticed today through the lens of what you deserved. The question for tomorrow: can you lead with one action before you start counting?"},axis3:{altrocentric:"You connected your work to something beyond yourself. That's what Maslow called self-transcendence: meaning from contributing to something that outlasts the moment.",other:"You saw someone else today. Perspective-taking is a skill — the more you practice it, the more naturally it comes.",self:"Self-focus is sometimes necessary. But the research is clear: people who report the most meaning at work are those whose concern extends past themselves."}};
const CHIPS={axis1:{internal:"chip-internal",external:"chip-external"},axis2:{contribution:"chip-contribution",entitlement:"chip-entitlement"},axis3:{altrocentric:"chip-altrocentric",other:"chip-other",self:"chip-self"}};

function buildSummary(){
  const a1=state.signals.axis1.dominant||(state.signals.axis1.internal>=state.signals.axis1.external?"internal":"external");
  const a2=state.signals.axis2.dominant||(state.signals.axis2.contribution>=state.signals.axis2.entitlement?"contribution":"entitlement");
  const s3=state.signals.axis3;let a3=state.signals.axis3.dominant;
  if(!a3){const m=Math.max(s3.altrocentric,s3.other,s3.self);a3=m===s3.altrocentric?"altrocentric":m===s3.other?"other":"self";}
  return`<div class="summary-block"><div class="summary-title">Your reflection for today</div><div class="axis-summary"><div class="axis-label">Axis I — Agency</div><div class="axis-result"><span class="axis-chip ${CHIPS.axis1[a1]}">${a1}</span>${SUMMARIES.axis1[a1]}</div></div><div class="axis-summary"><div class="axis-label">Axis II — Orientation</div><div class="axis-result"><span class="axis-chip ${CHIPS.axis2[a2]}">${a2}</span>${SUMMARIES.axis2[a2]}</div></div><div class="axis-summary"><div class="axis-label">Axis III — Radius</div><div class="axis-result"><span class="axis-chip ${CHIPS.axis3[a3]}">${a3}</span>${SUMMARIES.axis3[a3]}</div></div></div><div style="padding-top:28px"><button class="continue-btn" onclick="advance(null)">Finish <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>`;
}

function render(){
  const node=tree[state.currentId];
  const app=document.getElementById("app");
  const axis=getAxis(state.currentId);
  const pips=axis>0&&axis<4?`<div class="axis-indicator">${[1,2,3].map(i=>`<div class="axis-pip ${i<axis?"done":i===axis?"active":""}"></div>`).join("")}</div>`:"";
  const axisLabels=["","Axis I — Agency","Axis II — Orientation","Axis III — Radius"];
  if(node.type==="start"){app.innerHTML=`<div class="start-block"><div class="greeting"><em>Good evening.</em><br>Before the day slips away — let's look at it together.</div><div class="sub">Three axes. Fifteen questions. No scores. No judgment.</div><button class="start-btn" onclick="advance(null)">Begin reflection →</button></div>`;return;}
  if(node.type==="question"){const L="ABCD";const opts=node.options.map((o,i)=>`<button class="option-btn" onclick="selectOption(this,'${o.replace(/'/g,"\\'")}')"><span class="option-letter">${L[i]}</span><span>${o}</span></button>`).join("");app.innerHTML=`${pips}<div class="node-type-tag">${axisLabels[axis]||""}</div><div class="question-text">${interpolate(node.text)}</div><div class="options">${opts}</div>`;return;}
  if(node.type==="reflection"){app.innerHTML=`${pips}<div class="reflection-block"><span class="reflection-icon">${["◍","◐","◑","◒"][axis]||"◍"}</span><div class="reflection-text">${interpolate(node.text)}</div><button class="continue-btn" onclick="advance(null)">Continue <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>`;return;}
  if(node.type==="summary"){app.innerHTML=buildSummary();return;}
  if(node.type==="end"){app.innerHTML=`<div class="end-block"><div class="end-text">${node.text}</div><span class="restart-link" onclick="restart()">Start over</span></div>`;return;}
  advance(null);
}
function selectOption(btn,answer){document.querySelectorAll(".option-btn").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");setTimeout(()=>advance(answer),300);}
function restart(){state.currentId="START";state.answers={};state.signals={axis1:{internal:0,external:0,dominant:null},axis2:{contribution:0,entitlement:0,dominant:null},axis3:{altrocentric:0,other:0,self:0,dominant:null}};state.history=[];render();}
render();
</script>
</body>
